# Crear el secret con:
#   kubectl create secret docker-registry ghcr-credentials \
#     --namespace=ticketing \
#     --docker-server=ghcr.io \
#     --docker-username=<GITHUB_USER> \
#     --docker-password=<GITHUB_PAT> \
#     --docker-email=<EMAIL>
#
# Luego aplicar este archivo para parchear los deployments:
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-credentials
  namespace: ticketing
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: ""  # Se genera automáticamente con kubectl create secret
