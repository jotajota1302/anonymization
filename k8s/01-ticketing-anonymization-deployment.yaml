apiVersion: "v1"
kind: "Namespace"
metadata:
  name: "alicante"
  labels:
    name: "production"
---
# NOTA: El secret del registry de GHCR se crea manualmente con:
#   kubectl create secret docker-registry ghcr-docker-registry-secret \
#     --namespace=alicante --docker-server=ghcr.io \
#     --docker-username=jotajota1302 --docker-password=<GITHUB_PAT>
---
apiVersion: "v1"
kind: "Secret"
metadata:
  name: "ticketing-anonymization-secret"
  namespace: "alicante"
type: "Opaque"
data:
  # Valores placeholder — reemplazar con los reales: echo -n "valor" | base64
  ENCRYPTION_KEY: "Q0hBTkdFX01FX2dlbmVyYXRlX3dpdGhfcHl0aG9uX2Zlcm5ldA=="
  LLM_PROVIDER: "b3BlbmFp"
  OPENAI_API_KEY: "c2stQ0hBTkdFLU1F"
  OPENAI_MODEL: "Z3B0LTRvLW1pbmk="
  KOSIN_URL: "aHR0cHM6Ly91bWFuZS5lbWVhbC5udHRkYXRhLmNvbS9qaXJhaXRv"
  KOSIN_TOKEN: "Q0hBTkdFLU1FLXRva2Vu"
  KOSIN_EMAIL: "dXNlckBlbWVhbC5udHRkYXRhLmNvbQ=="
  KOSIN_PROJECT_KEY: "R0RORVNQQUlO"
---
apiVersion: "v1"
kind: "PersistentVolumeClaim"
metadata:
  name: "ticketing-anonymization-data"
  namespace: "alicante"
spec:
  accessModes:
  - "ReadWriteOnce"
  storageClassName: "azurefile"
  resources:
    requests:
      storage: "5Gi"
---
apiVersion: "v1"
kind: "Service"
metadata:
  name: "ticketing-anonymization-backend-service"
  namespace: "alicante"
  labels:
    app: "ticketing-anonymization"
    deptapp-name: "Ticketing_Anonymization"
spec:
  ports:
  - name: "http-backend"
    protocol: "TCP"
    port: 8000
    targetPort: 8000
  selector:
    name: "ticketing-anonymization-backend"
  type: "ClusterIP"
---
apiVersion: "v1"
kind: "Service"
metadata:
  name: "ticketing-anonymization-frontend-service"
  namespace: "alicante"
  labels:
    app: "ticketing-anonymization"
    deptapp-name: "Ticketing_Anonymization"
spec:
  ports:
  - name: "http-frontend"
    protocol: "TCP"
    port: 3000
    targetPort: 3000
  selector:
    name: "ticketing-anonymization-frontend"
  type: "ClusterIP"
---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "ticketing-anonymization-backend"
  namespace: "alicante"
  labels:
    app: "ticketing-anonymization"
    deptapp-name: "Ticketing_Anonymization"
spec:
  replicas: 1
  strategy:
    type: "RollingUpdate"
  selector:
    matchLabels:
      name: "ticketing-anonymization-backend"
  template:
    metadata:
      labels:
        deptapp-name: "Ticketing_Anonymization"
        name: "ticketing-anonymization-backend"
    spec:
      volumes:
      - name: "ticketing-anonymization-data-volume"
        persistentVolumeClaim:
          claimName: "ticketing-anonymization-data"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: "RuntimeDefault"
      containers:
      - name: "ticketing-anonymization-backend-container"
        image: "ghcr.io/jotajota1302/anonymization-backend:latest"
        ports:
        - containerPort: 8000
          protocol: "TCP"
        env:
        - name: "TZ"
          value: "Europe/Madrid"
        - name: "DATABASE_PATH"
          value: "/app/data/ticketing.db"
        - name: "ENCRYPTION_KEY"
          valueFrom:
            secretKeyRef:
              name: "ticketing-anonymization-secret"
              key: "ENCRYPTION_KEY"
        - name: "LLM_PROVIDER"
          valueFrom:
            secretKeyRef:
              name: "ticketing-anonymization-secret"
              key: "LLM_PROVIDER"
        - name: "OPENAI_API_KEY"
          valueFrom:
            secretKeyRef:
              name: "ticketing-anonymization-secret"
              key: "OPENAI_API_KEY"
        - name: "OPENAI_MODEL"
          valueFrom:
            secretKeyRef:
              name: "ticketing-anonymization-secret"
              key: "OPENAI_MODEL"
        - name: "KOSIN_URL"
          valueFrom:
            secretKeyRef:
              name: "ticketing-anonymization-secret"
              key: "KOSIN_URL"
        - name: "KOSIN_TOKEN"
          valueFrom:
            secretKeyRef:
              name: "ticketing-anonymization-secret"
              key: "KOSIN_TOKEN"
        - name: "KOSIN_EMAIL"
          valueFrom:
            secretKeyRef:
              name: "ticketing-anonymization-secret"
              key: "KOSIN_EMAIL"
        - name: "KOSIN_PROJECT_KEY"
          valueFrom:
            secretKeyRef:
              name: "ticketing-anonymization-secret"
              key: "KOSIN_PROJECT_KEY"
        volumeMounts:
        - name: "ticketing-anonymization-data-volume"
          mountPath: "/app/data"
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
        terminationMessagePath: "/dev/termination-log"
        imagePullPolicy: "Always"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
      restartPolicy: "Always"
      terminationGracePeriodSeconds: 30
      dnsPolicy: "ClusterFirst"
      imagePullSecrets:
      - name: "ghcr-docker-registry-secret"
---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "ticketing-anonymization-frontend"
  namespace: "alicante"
  labels:
    app: "ticketing-anonymization"
    deptapp-name: "Ticketing_Anonymization"
spec:
  replicas: 1
  strategy:
    type: "RollingUpdate"
  selector:
    matchLabels:
      name: "ticketing-anonymization-frontend"
  template:
    metadata:
      labels:
        deptapp-name: "Ticketing_Anonymization"
        name: "ticketing-anonymization-frontend"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: "RuntimeDefault"
      containers:
      - name: "ticketing-anonymization-frontend-container"
        image: "ghcr.io/jotajota1302/anonymization-frontend:latest"
        ports:
        - containerPort: 3000
          protocol: "TCP"
        env:
        - name: "TZ"
          value: "Europe/Madrid"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        terminationMessagePath: "/dev/termination-log"
        imagePullPolicy: "Always"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
      restartPolicy: "Always"
      terminationGracePeriodSeconds: 30
      dnsPolicy: "ClusterFirst"
      imagePullSecrets:
      - name: "ghcr-docker-registry-secret"
