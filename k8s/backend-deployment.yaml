apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ticketing
  labels:
    app: ticketing
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ticketing
      component: backend
  template:
    metadata:
      labels:
        app: ticketing
        component: backend
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: backend
          image: ghcr.io/jotajota1302/anonymization-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: backend-env
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: backend-data
